name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test audio-beat-mcp
        run: npm run test --workspace packages/audio-beat-mcp

      - name: Test video-research-mcp
        run: npm run test --workspace packages/video-research-mcp

      - name: Test premiere-mcp node suites
        run: npm run test:node --workspace packages/premiere-mcp

      - name: Test premiere-mcp jest suites
        run: npm run test:jest --workspace packages/premiere-mcp

      - name: Test root orchestrator suites
        run: node scripts/run-node-tests.mjs test

      - name: Build
        run: npm run build
