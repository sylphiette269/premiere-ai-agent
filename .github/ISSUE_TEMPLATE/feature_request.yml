name: 功能建议
description: 提交新的能力建议或工作流改进建议
title: "[建议] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 请说明当前卡点、限制或使用场景
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你希望怎么改
      description: 请描述你想要的新能力或改进方向
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的其他方案
      description: 可选
